version: "3.8"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "${APP_PORT:-3100}:3000"
    environment:
      DATABASE_URL: "${DATABASE_URL}"
      NEXTAUTH_SECRET: "${NEXTAUTH_SECRET:-change-me-in-production-please}"
      NEXTAUTH_URL: "${NEXTAUTH_URL:-http://localhost:3100}"
      NEXT_PUBLIC_APP_URL: "${NEXT_PUBLIC_APP_URL:-http://localhost:3100}"
      STRIPE_SECRET_KEY: "${STRIPE_SECRET_KEY:-}"
      NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: "${NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY:-}"
      STRIPE_WEBHOOK_SECRET: "${STRIPE_WEBHOOK_SECRET:-}"
      USE_LOCAL_STORAGE: "true"
    volumes:
      - uploads:/app/public/uploads
    # Use host network to reach existing PostgreSQL on the Pi
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  uploads:
